<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Love All Doubles | CGI 100分制</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #0f172a; color: white; -webkit-tap-highlight-color: transparent; }
        /* 结构加固：卡片高度统一 */
        .card { background: #1e293b; border-radius: 16px; border-left: 6px solid; min-height: 420px; display: flex; flex-direction: column; }
        .team-1 { border-left-color: #6366f1; }
        .team-2 { border-left-color: #ec4899; }
        /* 按钮样式优化 */
        .stat-row { background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 6px; padding: 6px 10px; }
        .circle-btn { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; transition: all 0.1s; }
        .circle-btn:active { background: rgba(255,255,255,0.3); transform: scale(0.9); }
        /* 解决名字错位：固定高度容器 */
        .name-container { height: 40px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 12px; display: flex; align-items: center; }
        input { background: transparent; border: none; outline: none; font-weight: bold; width: 100%; }
        .history-card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <div id="capture-area" class="w-full max-w-md p-6 bg-[#0f172a]">
        <div class="flex justify-between items-center mb-10 px-6">
            <div class="text-center">
                <p class="text-[9px] text-indigo-400 font-black tracking-[0.2em] mb-2 uppercase">TEAM 1</p>
                <input id="score-t1" type="number" value="0" class="text-5xl text-center !w-20 font-black text-white">
            </div>
            <div class="text-slate-800 italic font-black text-2xl px-4">VS</div>
            <div class="text-center">
                <p class="text-[9px] text-pink-400 font-black tracking-[0.2em] mb-2 uppercase">TEAM 2</p>
                <input id="score-t2" type="number" value="0" class="text-5xl text-center !w-20 font-black text-white">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4" id="player-grid"></div>
        
        <div class="mt-8 text-center">
            <p class="text-[8px] text-slate-700 uppercase tracking-[0.3em]">CGI Index: Based on Winner, Volley & Errors</p>
        </div>
    </div>

    <div class="w-full max-w-md mt-6 space-y-4 pb-12">
        <div class="flex gap-3">
            <button onclick="takeShot()" class="flex-[2.5] bg-indigo-600 py-4 rounded-2xl font-black shadow-xl shadow-indigo-500/20 active:scale-95 transition-all">导出处刑单 📸</button>
            <button onclick="saveMatch()" class="flex-1 bg-emerald-600 rounded-2xl font-black text-sm active:scale-95 transition-all">保存战报</button>
        </div>
        
        <div class="mt-12">
            <h3 class="text-[10px] font-bold text-slate-500 mb-4 tracking-widest uppercase flex items-center gap-2">
                <span class="w-8 h-[1px] bg-slate-800"></span> 历史记录 (LOCAL)
            </h3>
            <div id="history-list"></div>
            <button onclick="clearAll()" class="w-full mt-8 text-[9px] text-slate-700 uppercase underline tracking-widest">清空数据</button>
        </div>
    </div>

    <script>
        const config = [
            { id: '1st', label: '1ST IN', plus: 2, minus: 0 },
            { id: 'df', label: 'DF', plus: 0, minus: -8 },
            { id: 'ue', label: 'UE', plus: 0, minus: -4 },
            { id: 'wn', label: 'WN', plus: 6, minus: 0 },
            { id: 'vol', label: 'VOL', plus: 4, minus: 0 }
        ];
        
        let players = JSON.parse(localStorage.getItem('current_match')) || Array(4).fill().map(() => ({ name: '', stats: { '1st':0, df:0, ue:0, wn:0, vol:0 } }));
        let history = JSON.parse(localStorage.getItem('match_history')) || [];

        function calculateCGI(p) {
            let score = 50; // 基础分
            score += (p.stats['1st'] * 2);
            score -= (p.stats['df'] * 8);
            score -= (p.stats['ue'] * 4);
            score += (p.stats['wn'] * 6);
            score += (p.stats['vol'] * 4);
            return Math.min(100, Math.max(0, score));
        }

        function render() {
            const grid = document.getElementById('player-grid');
            grid.innerHTML = '';
            players.forEach((p, i) => {
                const isT1 = i < 2;
                const cgi = calculateCGI(p);
                const colorClass = isT1 ? 'text-indigo-400' : 'text-pink-400';
                const card = document.createElement('div');
                card.className = `card p-4 ${isT1 ? 'team-1' : 'team-2'}`;
                
                let statsHtml = config.map(s => `
                    <div class="stat-row flex justify-between items-center">
                        <span class="text-[9px] opacity-40 font-bold">${s.label}</span>
                        <div class="flex items-center gap-2">
                            <button onclick="change(${i},'${s.id}',-1)" class="circle-btn bg-white/5 text-slate-500">-</button>
                            <span class="font-mono font-bold w-4 text-center text-sm">${p.stats[s.id]}</span>
                            <button onclick="change(${i},'${s.id}',1)" class="circle-btn bg-white/10 text-white">+</button>
                        </div>
                    </div>
                `).join('');

                card.innerHTML = `
                    <div class="name-container">
                        <input class="text-xs ${colorClass} uppercase tracking-wider" placeholder="PLAYER ${String.fromCharCode(65+i)}" value="${p.name}" onchange="updateName(${i}, this.value)">
                    </div>
                    <div class="flex-1">${statsHtml}</div>
                    <div class="mt-4 pt-3 border-t border-white/5 flex justify-between items-end">
                        <div class="flex flex-col">
                            <span class="text-[7px] opacity-30 font-bold uppercase">CGI INDEX</span>
                            <span class="text-[8px] font-bold ${cgi >= 60 ? 'text-emerald-500' : 'text-red-500'}">${cgi >= 60 ? 'ELITE' : 'POOR'}</span>
                        </div>
                        <span class="text-2xl font-black ${cgi > 80 ? 'text-yellow-400' : cgi < 40 ? 'text-slate-500' : 'text-white'}">${cgi}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
            localStorage.setItem('current_match', JSON.stringify(players));
            renderHistory();
        }

        function change(pIdx, sId, val) {
            players[pIdx].stats[sId] = Math.max(0, players[pIdx].stats[sId] + val);
            render();
        }

        function updateName(i, val) { players[i].name = val; localStorage.setItem('current_match', JSON.stringify(players)); }

        function saveMatch() {
            const data = {
                id: Date.now(),
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                score: `${document.getElementById('score-t1').value}:${document.getElementById('score-t2').value}`,
                details: players.map(p => `${p.name || '?'}(${calculateCGI(p)})`).join(' ')
            };
            history.unshift(data);
            localStorage.setItem('match_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = history.map(h => `
                <div class="history-card flex justify-between items-center">
                    <div>
                        <p class="text-[10px] font-black">${h.time} <span class="mx-2 opacity-20">|</span> SCORE ${h.score}</p>
                        <p class="text-[8px] opacity-40 mt-1 font-mono">${h.details}</p>
                    </div>
                    <button onclick="deleteHistory(${h.id})" class="text-[10px] text-red-900 font-bold px-2">DEL</button>
                </div>
            `).join('');
        }

        function deleteHistory(id) { history = history.filter(h => h.id !== id); localStorage.setItem('match_history', JSON.stringify(history)); renderHistory(); }
        function clearAll() { if(confirm('确定清空所有战报吗？')) { localStorage.clear(); location.reload(); } }

        async function takeShot() {
            const area = document.querySelector("#capture-area");
            const canvas = await html2canvas(area, { backgroundColor: '#0f172a', scale: 3, useCORS: true });
            const link = document.createElement('a');
            link.download = `LoveAll-CGI-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        render();
    </script>
</body>
</html>
