<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双打现形现场</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .player-card { background: #1e293b; border-radius: 12px; position: relative; border-left: 6px solid transparent; }
        .team-indigo { border-left-color: #6366f1; }
        .team-pink { border-left-color: #ec4899; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .btn { background: rgba(255,255,255,0.05); padding: 10px 4px; border-radius: 8px; text-align: center; cursor: pointer; }
        .btn:active { background: rgba(255,255,255,0.2); }
        input { background: transparent; border: none; font-weight: bold; width: 80%; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">
    <div id="capture-box" class="w-full max-w-md p-6 bg-[#0f172a] rounded-xl">
        <h1 class="text-center text-xl font-black mb-6">谁是菜狗？现形现场 🐶</h1>
        
        <div class="grid grid-cols-2 gap-4">
            <div class="player-card team-indigo p-4">
                <input value="PLAYER A" class="text-indigo-400 mb-3 uppercase">
                <div class="stat-grid text-[10px]" data-p="0"></div>
                <div class="mt-4 pt-2 border-t border-white/5 text-center font-bold text-indigo-400 perf-val">PERF: 0</div>
            </div>
            <div class="player-card team-indigo p-4">
                <input value="PLAYER B" class="text-indigo-400 mb-3 uppercase">
                <div class="stat-grid text-[10px]" data-p="1"></div>
                <div class="mt-4 pt-2 border-t border-white/5 text-center font-bold text-indigo-400 perf-val">PERF: 0</div>
            </div>
            <div class="player-card team-pink p-4">
                <input value="PLAYER C" class="text-pink-400 mb-3 uppercase">
                <div class="stat-grid text-[10px]" data-p="2"></div>
                <div class="mt-4 pt-2 border-t border-white/5 text-center font-bold text-pink-400 perf-val">PERF: 0</div>
            </div>
            <div class="player-card team-pink p-4">
                <input value="PLAYER D" class="text-pink-400 mb-3 uppercase">
                <div class="stat-grid text-[10px]" data-p="3"></div>
                <div class="mt-4 pt-2 border-t border-white/5 text-center font-bold text-pink-400 perf-val">PERF: 0</div>
            </div>
        </div>
    </div>

    <div class="mt-10 flex gap-4">
        <button onclick="takeShot()" class="bg-indigo-600 px-6 py-3 rounded-full font-bold text-sm">导出处刑单 📸</button>
        <button onclick="location.reload()" class="bg-slate-700 px-6 py-3 rounded-full font-bold text-sm">重置</button>
    </div>

    <script>
        const stats = [
            {id:'1st', label:'1ST IN'}, {id:'df', label:'DF'}, {id:'ue', label:'UE'},
            {id:'wn', label:'WN'}, {id:'vol', label:'VOL'}
        ];
        const data = Array(4).fill().map(() => ({ '1st':0, df:0, ue:0, wn:0, vol:0 }));

        document.querySelectorAll('.stat-grid').forEach((grid, pIdx) => {
            stats.forEach(s => {
                const b = document.createElement('div');
                b.className = 'btn';
                b.innerHTML = `<div class="opacity-40 mb-1">${s.label}</div><div class="text-lg font-bold" id="p${pIdx}-${s.id}">0</div>`;
                b.onclick = () => { data[pIdx][s.id]++; updateUI(pIdx, s.id); };
                // 长按减分逻辑
                let t; b.onmousedown = b.ontouchstart = () => { t = setTimeout(() => { if(data[pIdx][s.id]>0) data[pIdx][s.id]--; updateUI(pIdx, s.id); }, 600); };
                b.onmouseup = b.ontouchend = () => clearTimeout(t);
                grid.appendChild(b);
            });
        });

        function updateUI(pIdx, sId) {
            document.getElementById(`p${pIdx}-${sId}`).innerText = data[pIdx][sId];
            const p = data[pIdx];
            const score = (p.wn * 2 + p.vol) - (p.df + p.ue);
            document.querySelectorAll('.perf-val')[pIdx].innerText = `PERF: ${score}`;
        }

        function takeShot() {
            html2canvas(document.querySelector("#capture-box"), { backgroundColor: "#0f172a", scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Tennis-Doubles-Log.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
