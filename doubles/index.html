<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Love All Doubles | 现形现场</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #0f172a; color: white; -webkit-tap-highlight-color: transparent; }
        .card { background: #1e293b; border-radius: 16px; border-left: 6px solid; }
        .team-1 { border-left-color: #6366f1; }
        .team-2 { border-left-color: #ec4899; }
        .stat-row { background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 4px; padding: 4px 8px; }
        .circle-btn { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; }
        .history-item { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 8px; margin-bottom: 8px; font-size: 11px; }
        input { background: transparent; border: none; outline: none; font-weight: bold; width: 100%; }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <div id="capture-area" class="w-full max-w-md p-6 bg-[#0f172a]">
        <div class="flex justify-between items-center mb-8 px-4">
            <div class="text-center">
                <p class="text-[10px] text-indigo-400 font-bold uppercase">Team 1</p>
                <input id="score-t1" type="number" value="0" class="text-4xl text-center !w-16">
            </div>
            <div class="text-slate-600 italic font-black text-2xl">VS</div>
            <div class="text-center">
                <p class="text-[10px] text-pink-400 font-bold uppercase">Team 2</p>
                <input id="score-t2" type="number" value="0" class="text-4xl text-center !w-16">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4" id="player-grid"></div>
    </div>

    <div class="w-full max-w-md mt-6 space-y-4">
        <div class="flex gap-2">
            <button onclick="takeShot()" class="flex-1 bg-indigo-600 py-4 rounded-2xl font-black shadow-lg shadow-indigo-500/30">导出处刑单 📸</button>
            <button onclick="saveMatch()" class="bg-emerald-600 px-6 rounded-2xl font-black">存战报</button>
        </div>
        
        <div class="mt-8">
            <h3 class="text-xs font-bold text-slate-500 mb-4 tracking-widest uppercase">历史记录 (本地)</h3>
            <div id="history-list"></div>
            <button onclick="clearAll()" class="w-full mt-4 text-[10px] text-slate-600 uppercase underline">重置所有数据</button>
        </div>
    </div>

    <script>
        const config = [
            { id: '1st', label: '1ST IN' }, { id: 'df', label: 'DF' },
            { id: 'ue', label: 'UE' }, { id: 'wn', label: 'WN' }, { id: 'vol', label: 'VOL' }
        ];
        let players = JSON.parse(localStorage.getItem('current_match')) || Array(4).fill().map(() => ({ name: '', stats: { '1st':0, df:0, ue:0, wn:0, vol:0 } }));
        let history = JSON.parse(localStorage.getItem('match_history')) || [];

        function render() {
            const grid = document.getElementById('player-grid');
            grid.innerHTML = '';
            players.forEach((p, i) => {
                const isTeam1 = i < 2;
                const card = document.createElement('div');
                card.className = `card p-4 ${isTeam1 ? 'team-1' : 'team-2'}`;
                
                let statsHtml = config.map(s => `
                    <div class="stat-row flex justify-between items-center">
                        <span class="text-[9px] opacity-40 font-bold">${s.label}</span>
                        <div class="flex items-center gap-3">
                            <button onclick="change(${i},'${s.id}',-1)" class="circle-btn bg-white/5 text-slate-400">-</button>
                            <span class="font-mono font-bold w-4 text-center text-sm">${p.stats[s.id]}</span>
                            <button onclick="change(${i},'${s.id}',1)" class="circle-btn bg-white/10 text-white">+</button>
                        </div>
                    </div>
                `).join('');

                const perf = (p.stats.wn * 2 + p.stats.vol) - (p.stats.df + p.stats.ue);
                card.innerHTML = `
                    <input class="mb-4 text-xs ${isTeam1?'text-indigo-400':'text-pink-400'}" placeholder="选手姓名" value="${p.name}" onchange="updateName(${i}, this.value)">
                    ${statsHtml}
                    <div class="mt-4 pt-2 border-t border-white/5 text-center text-[10px] font-black opacity-60">PERF: ${perf}</div>
                `;
                grid.appendChild(card);
            });
            localStorage.setItem('current_match', JSON.stringify(players));
            renderHistory();
        }

        function change(pIdx, sId, val) {
            players[pIdx].stats[sId] = Math.max(0, players[pIdx].stats[sId] + val);
            render();
        }

        function updateName(i, val) { players[i].name = val; localStorage.setItem('current_match', JSON.stringify(players)); }

        function saveMatch() {
            const matchData = {
                date: new Date().toLocaleString(),
                score: `${document.getElementById('score-t1').value}:${document.getElementById('score-t2').value}`,
                players: JSON.parse(JSON.stringify(players))
            };
            history.unshift(matchData);
            localStorage.setItem('match_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = history.map((h, idx) => `
                <div class="history-item flex justify-between items-center">
                    <span>${h.date} | 比分 ${h.score}</span>
                    <button onclick="deleteHistory(${idx})" class="text-red-500 font-bold">DEL</button>
                </div>
            `).join('');
        }

        function deleteHistory(idx) { history.splice(idx, 1); localStorage.setItem('match_history', JSON.stringify(history)); renderHistory(); }
        function clearAll() { localStorage.clear(); location.reload(); }

        async function takeShot() {
            const area = document.querySelector("#capture-area");
            const canvas = await html2canvas(area, { backgroundColor: '#0f172a', scale: 2, useCORS: true });
            const link = document.createElement('a');
            link.download = `LoveAll-Result.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        render();
    </script>
</body>
</html>
