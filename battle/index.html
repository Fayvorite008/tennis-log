<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Love All Battle | CGI V6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b1120; color: white; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 16px; }
        .btn-stat-row { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 4px; padding: 4px 10px; display: flex; justify-content: space-between; align-items: center; }
        .circle-btn { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; }
        .circle-btn:active { background: rgba(255,255,255,0.15); transform: scale(0.95); }
        input { background: transparent; border: none; color: white; outline: none; }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <header class="text-center mb-8 mt-4">
        <h1 class="text-3xl font-800 tracking-tighter italic text-white">LOVE ALL <span class="text-lime-400">LOG</span> 🐶</h1>
        <p class="text-slate-500 text-[10px] mt-1 uppercase tracking-[0.3em] font-bold">菜狗记录库 · 无论单双，都要优雅</p>
    </header>

    <div class="glass-card p-6 w-full max-w-md shadow-2xl mb-8">
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="text-center">
                <input class="text-center text-indigo-400 font-bold w-full uppercase" value="PLAYER A">
                <div id="p1-cgi" class="text-4xl font-black my-2">50</div>
                <p class="text-[9px] text-slate-600 uppercase tracking-widest font-bold">Live CGI</p>
            </div>
            <div class="text-center">
                <input class="text-center text-pink-400 font-bold w-full uppercase" value="PLAYER B">
                <div id="p2-cgi" class="text-4xl font-black my-2">50</div>
                <p class="text-[9px] text-slate-600 uppercase tracking-widest font-bold">Live CGI</p>
            </div>
        </div>
        
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-slate-900/60 rounded-xl p-2" id="grid-0"></div>
            <div class="bg-slate-900/60 rounded-xl p-2" id="grid-1"></div>
        </div>

        <button onclick="saveMatch()" class="w-full bg-lime-500 text-black py-4 rounded-xl font-800 uppercase active:scale-95 transition-transform shadow-lg shadow-lime-500/20">Log with Love 🎾</button>
    </div>

    <details class="w-full max-w-md mt-6 text-slate-700">
        <summary class="text-center text-[9px] uppercase tracking-[0.3em] cursor-pointer">Expand History Logs</summary>
        <div id="history-list" class="mt-4 space-y-3 text-[10px] font-mono"></div>
    </button>

    <script>
        const config = [
            { id: 'wn', label: 'Winner' }, { id: 'vol', label: 'Volley' },
            { id: 'df', label: 'DoubleFault' }, { id: 'ue', label: 'Error' }
        ];
        let pData = Array(2).fill().map(() => ({ wn:0, vol:0, df:0, ue:0 }));
        let history = JSON.parse(localStorage.getItem('match_history_v1') || '[]');

        function calculateCGI(p) {
            let score = 50 + (p.wn * 6 + p.vol * 4) - (p.df * 8 + p.ue * 4);
            return Math.min(100, Math.max(0, score));
        }

        function render() {
            [0,1].forEach(i => {
                const grid = document.getElementById(`grid-${i}`);
                grid.innerHTML = '';
                const p = pData[i];
                document.getElementById(`p${i+1}-cgi`).innerText = calculateCGI(p);
                
                config.forEach(s => {
                    const row = document.createElement('div');
                    row.className = 'btn-stat-row';
                    row.innerHTML = `
                        <span class="text-[9px] opacity-40 font-bold">${s.label}</span>
                        <div class="flex items-center gap-1.5">
                            <button onclick="change(${i},'${s.id}',-1)" class="circle-btn bg-white/5 text-slate-600">-</button>
                            <span class="font-mono font-bold w-4 text-center text-sm">${p[s.id]}</span>
                            <button onclick="change(${i},'${s.id}',1)" class="circle-btn bg-white/10 text-white">+</button>
                        </div>`;
                    grid.appendChild(row);
                });
            });
            renderHistory();
        }

        function change(i, s, v) { pData[i][s] = Math.max(0, pData[i][s]+v); render(); }
        
        function saveMatch() {
            history.unshift({id: Date.now(), p1: {...pData[0]}, p2: {...pData[1]}});
            localStorage.setItem('match_history_v1', JSON.stringify(history));
            renderHistory();
            alert('Match Logged Successfully!');
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = history.map(h => `<div class="bg-slate-900 rounded p-2 border border-white/5">LOG | P1(${calculateCGI(h.p1)}) vs P2(${calculateCGI(h.p2)})</div>`).join('');
        }
        
        render();
    </script>
</body>
</html>
