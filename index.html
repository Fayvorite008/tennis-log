<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Love All Log 🎾</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0f19; color: #e2e8f0; }
        .glass-panel { background: rgba(22, 30, 46, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; }
        .hidden { display: none; }
        .btn-active { background-color: #a3e635; color: black; }
    </style>
</head>
<body class="p-4 pb-20">

    <nav class="flex justify-center gap-2 mb-8 bg-slate-900/50 p-1 rounded-full border border-white/5 w-fit mx-auto">
        <button id="btn-solo" onclick="switchMode('solo')" class="px-6 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest transition-all">Solo Mode</button>
        <button id="btn-dual" onclick="switchMode('dual')" class="px-6 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest transition-all">Love All (Dual)</button>
    </nav>

    <div id="dual-view" class="mode-view">
        <header class="mb-6 text-center">
            <h1 class="text-3xl font-900 tracking-tighter italic text-white">Love All <span class="text-lime-400">Log</span> 🎾</h1>
            <p class="text-slate-500 text-[9px] uppercase tracking-[0.3em]">Dual Battle Record</p>
        </header>

        <div class="glass-panel p-4 mb-6 space-y-3">
            <div class="grid grid-cols-2 gap-3">
                <input id="p1Name" type="text" placeholder="Player A" class="bg-slate-900/50 rounded-lg p-3 text-xs border border-white/5">
                <input id="p2Name" type="text" placeholder="Player B" class="bg-slate-900/50 rounded-lg p-3 text-xs border border-white/5">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <input id="matchScore" type="text" placeholder="Score 6:4" class="bg-slate-900/50 rounded-lg p-3 text-xs border border-white/5">
                <input id="location" type="text" placeholder="Location" class="bg-slate-900/50 rounded-lg p-3 text-xs border border-white/5">
            </div>
        </div>

        <div class="space-y-4 mb-8">
            <div class="text-center text-[10px] font-bold text-lime-400 uppercase tracking-widest mb-1">Winners 👑</div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="countDual('p1','wn')" class="glass-panel py-6 text-3xl font-bold text-lime
